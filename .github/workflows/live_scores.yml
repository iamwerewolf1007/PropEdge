name: Live Scores

on:
  schedule:
    # Every 5 minutes during game windows (7 PM - 1 AM ET)
    # 7 PM ET = 00:00 UTC (next day during EST) or 23:00 UTC (during EDT)
    - cron: '*/5 23 * * *'    # 7-8 PM ET (EDT)
    - cron: '*/5 0-5 * * *'   # 8 PM - 1 AM ET
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: live-scores
  cancel-in-progress: true

jobs:
  live:
    runs-on: ubuntu-latest
    env:
      PROPEDGE_DIR: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch live scores
        run: python scripts/live_scores.py

      - name: Commit and push if changed
        run: |
          git config user.name "PropEdge Bot"
          git config user.email "propedge-bot@users.noreply.github.com"
          git add data/live.json
          git diff --cached --quiet || git commit -m "📊 Live $(date +%H:%M)"
          git push || true  # don't fail on concurrent push conflicts
