name: Pre-Game Analysis

on:
  schedule:
    - cron: '0 19 * * *'  # 2 PM ET (UTC-5) / 3 PM ET (UTC-4 DST)
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    env:
      PROPEDGE_DIR: ${{ github.workspace }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      TZ: America/New_York

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pandas numpy requests nba_api

      - name: Run pre-game analysis
        run: python scripts/pregame_analysis.py

      - name: Commit and push
        run: |
          git config user.name "PropEdge Bot"
          git config user.email "propedge-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "🎯 Pre-game $(date +%Y-%m-%d)"
          git push
