.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.hdr-t{font:800 22px/1.1 var(--M);letter-spacing:-.5px;background:linear-gradient(135deg,var(--bl),var(--vi));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}

.st-v{font:700 17px var(--M)}
.st-l{font:500 7px var(--M);color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.fl{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.pl{font:500 10px var(--M);padding:5px 11px;border-radius:8px;cursor:pointer;border:1px solid var(--bg2);background:var(--bg1);color:var(--tx3);transition:.15s;white-space:nowrap}
.pl:active{transform:scale(.96)}
.pl.bl{border-color:rgba(56,189,248,.3);background:var(--blA);color:var(--bl)}
.pl.vi{border-color:rgba(167,139,250,.3);background:var(--viA);color:var(--vi)}
.pl.yl{border-color:rgba(251,191,36,.3);background:var(--ylA);color:var(--yl)}
.pl.gr{border-color:rgba(52,211,153,.3);background:var(--grA);color:var(--gr)}
.cd{border-radius:12px;padding:11px 13px;margin-bottom:7px;cursor:pointer;border-left:3px solid var(--tx4);background:rgba(12,18,32,.7);transition:all .2s}
.cd:active{transform:scale(.99)}
.cd.og{border-color:var(--gr)}.cd.ug{border-color:var(--rd)}
.kv{text-align:center}
.kv-l{font:500 7px var(--M);color:var(--tx3);text-transform:uppercase;letter-spacing:.5px}
.kv-v{font:700 14px var(--M);margin-top:1px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:8px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:8px}
.sec{font:600 8px var(--M);color:var(--tx3);letter-spacing:1.2px;margin-bottom:5px;text-transform:uppercase}
.ctx{background:var(--bg);border-radius:8px;padding:9px;margin-bottom:6px;display:flex;gap:10px;flex-wrap:wrap;font:400 11px var(--S);color:var(--tx2);border:1px solid rgba(56,189,248,.04)}
.rsn{background:var(--bg1);border-radius:8px;padding:10px 12px;font:400 11px var(--S);color:var(--tx2);line-height:1.65;border:1px solid rgba(56,189,248,.04)}
.flag-grid{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.flag{font:500 9px var(--M);padding:3px 8px;border-radius:6px;border:1px solid}
.flag-y{border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.08);color:var(--gr)}
.flag-n{border-color:rgba(248,113,113,.2);background:rgba(248,113,113,.06);color:var(--rd)}
.ft{margin-top:18px;background:var(--bg1);border-radius:10px;padding:14px;font:400 10px var(--S);color:var(--tx3);line-height:1.6}
.ld{text-align:center;padding:30px;color:var(--tx3);font:400 13px var(--S)}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

const dBg=ov?"var(--grA)":un?"var(--rdA)":"rgba(148,163,184,.12)";
const dC=ov?"var(--gr)":un?"var(--rd)":"var(--tx2)";
const dl=p.dir==="NO PLAY"?(p.rawDir||"\u2014"):p.dir;
const k=p.player+"_"+p.line;
const o=exp.has(k);
const tBg=p.tier===1?"var(--grA)":p.tier===2?"var(--ylA)":"rgba(148,163,184,.06)";
const tC=p.tier===1?"var(--gr)":p.tier===2?"var(--yl)":"var(--tx4)";
const flagC=p.flags>=8?"var(--gr)":p.flags>=6?"var(--yl)":"var(--rd)";

let h=`<div class="cd ${bdr}" onclick="tgl('${k.replace(/'/g,"\\'")}')">`;

// Top row
h+=`<div style="display:flex;justify-content:space-between;align-items:flex-start">
<div style="flex:1">
  <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
    <span style="font:700 9px var(--M);padding:1px 7px;border-radius:8px;background:${dBg};color:${dC}">${dl}</span>
    <span style="font-weight:600;font-size:13px">${p.player}</span>
    <span style="font:700 8px var(--M);padding:2px 5px;border-radius:4px;background:${tBg};color:${tC}">T${p.tier}</span>
    <span style="font:700 9px var(--M);padding:2px 6px;border-radius:4px;background:rgba(56,189,248,.08);color:${flagC}">${p.flagsStr}</span>
  </div>
  <div style="font-size:9px;color:var(--tx2);margin-top:2px">${p.match} &middot; ${p.gameTime} &middot; ${p.position} &middot; ${Math.round(p.conf*100)}% conf</div>
</div>
<div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">`;

// Result or pre-game
if(p.result==="WIN")h+=`<span style="font:800 10px var(--M);padding:2px 8px;border-radius:5px;background:var(--grA);color:var(--gr)">WIN</span>`;
else if(p.result==="LOSS")h+=`<span style="font:800 10px var(--M);padding:2px 8px;border-radius:5px;background:var(--rdA);color:var(--rd)">LOSS</span>`;
else h+=`<span style="font:600 10px var(--M);color:var(--tx3)">${p.units}u</span>`;

if(p.actualPts!=null) h+=`<span style="font:400 10px var(--M);color:var(--tx2)">Actual: ${Math.round(p.actualPts)}</span>`;
if(p.edge!=null){
  const ec=p.edge>0?"var(--gr)":p.edge<-3?"var(--rd)":"var(--tx3)";
  h+=`<span style="font:600 9px var(--M);color:${ec}">Edge: ${p.edge>0?"+":""}${p.edge}%</span>`;
}
h+=`</div></div>`;

// Key stats + sparkline
h+=`<div style="display:flex;align-items:center;gap:10px;margin-top:8px">
${[["Line",p.line,"var(--tx)"],["L30",p.l30,clr(p.l30,p.line)],["HR%",p.hr30+"%",hrc(p.hr30)]].map(([k,v,c])=>`<div class="kv"><div class="kv-l">${k}</div><div class="kv-v" style="color:${c}">${v||"-"}</div></div>`).join("")}
<div class="kv"><div class="kv-l">Odds</div><div class="kv-v" style="font-size:12px">${p.dir==="OVER"?(p.overOdds||"-"):(p.underOdds||"-")}</div></div>
<div style="margin-left:auto">${spark(p.recent,p.line)}</div></div>`;

// Conf bar
const cf=Math.max(0,Math.min(100,((p.conf-.45)/.4)*100));
h+=`<div style="display:flex;align-items:center;gap:6px;margin-top:6px">
<span style="font:500 7px var(--M);color:var(--tx3);text-transform:uppercase;letter-spacing:.5px">Conf</span>
<div style="flex:1;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden"><div style="width:${cf}%;height:100%;background:${cfc(p.conf)};border-radius:2px"></div></div>
<span style="font:700 10px var(--M);color:${cfc(p.conf)};min-width:30px;text-align:right">${Math.round(p.conf*100)}%</span></div>`;

// Recent scores
if(p.recent&&p.recent.length) h+=`<div style="display:flex;gap:5px;margin-top:5px">${p.recent.map(v=>`<span style="font:600 9px var(--M);color:${v>p.line?"var(--gr)":"var(--rd)"}">${v}</span>`).join("")}<span style="font:400 8px var(--M);color:var(--tx3);margin-left:4px">(${p.recentOver||0}/${p.recent.length} over)</span></div>`;

// Expanded view
if(o){
h+=`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--bg2);animation:fadeIn .25s ease-out">`;

// Pre-match reasoning
if(p.preMatchReason) h+=`<div class="rsn" style="margin-bottom:8px;border-left:2px solid var(--bl)"><strong style="color:var(--bl);font-size:10px">\u{1F4CA} MODEL ANALYSIS</strong><br>${p.preMatchReason}</div>`;

// Flags detail
h+=`<div class="sec">Signal Flags (${p.flagsStr})</div><div class="flag-grid">`;
if(p.flagDetails) p.flagDetails.forEach(f=>{
  if(f.agrees===null) return;
  h+=`<div class="flag ${f.agrees?"flag-y":"flag-n"}">${f.agrees?"\u2713":"\u2717"} ${f.name}</div>`;
});
h+=`</div>`;

// Scoring averages
h+=`<div class="sec">Scoring Averages</div><div class="g4">${[["L30",p.l30],["L10",p.l10],["L5",p.l5],["L3",p.l3]].map(([k,v])=>`<div class="kv"><div class="kv-l">${k}</div><div class="kv-v" style="color:${clr(v,p.line)};font-size:13px">${v||"-"}</div></div>`).join("")}</div>`;

// Matchup
h+=`<div class="sec">Matchup Context</div><div class="g4">${[["DEF POS","#"+p.defP,dfc(p.defP)],["PACE","#"+p.pace,"var(--tx)"],["HR L30",p.hr30+"%",hrc(p.hr30)],["HR L10",p.hr10+"%",hrc(p.hr10)]].map(([k,v,c])=>`<div class="kv"><div class="kv-l">${k}</div><div class="kv-v" style="color:${c};font-size:13px">${v}</div></div>`).join("")}</div>`;

// Shooting + Minutes
h+=`<div class="sec">Shooting & Minutes</div><div class="g4">${[["FG L30",p.fgL30?p.fgL30+"%":"-"],["FG L10",p.fgL10?p.fgL10+"%":"-"],["MIN L30",p.minL30||"-"],["MIN L10",p.minL10||"-"]].map(([k,v])=>`<div class="kv"><div class="kv-l">${k}</div><div class="kv-v" style="color:var(--tx);font-size:13px">${v}</div></div>`).join("")}</div>`;

// Betting context
h+=`<div class="sec">Betting Context</div><div class="ctx">`;
h+=`<span>Over: ${p.overOdds||"-"}</span><span>Under: ${p.underOdds||"-"}</span>`;
h+=`<span>Books: ${p.books}</span>`;
if(p.lineSpread!=null) h+=`<span>Line range: ${p.minLine}-${p.maxLine}</span>`;
if(p.impliedProb) h+=`<span>Implied: ${p.impliedProb}%</span>`;
if(p.edge!=null) h+=`<span style="color:${p.edge>0?"var(--gr)":"var(--rd)"}">Edge: ${p.edge>0?"+":""}${p.edge}%</span>`;
h+=`</div>`;

// Game context
h+=`<div class="ctx">`;
if(p.spread!=null) h+=`<span>Spread: ${p.spread>0?"+":""}${p.spread}</span>`;
if(p.total!=null) h+=`<span>Total: ${p.total}</span>`;
if(p.blowout) h+=`<span style="color:var(--yl)">\u26A0 Blowout Risk</span>`;
if(p.h2hG>0) h+=`<span style="color:var(--vi)">H2H: ${p.h2h}</span>`;
if(p.std10>0) h+=`<span>\u03C3: ${p.std10}</span>`;
h+=`</div>`;

// Home/Away + B2B
h+=`<div class="ctx">`;
if(p.homeAvgPts) h+=`<span>Home avg: ${p.homeAvgPts}</span>`;
if(p.awayAvgPts) h+=`<span>Away avg: ${p.awayAvgPts}</span>`;
if(p.b2bAvgPts) h+=`<span>B2B avg: ${p.b2bAvgPts}</span>`;
if(p.restAvgPts) h+=`<span>Rest avg: ${p.restAvgPts}</span>`;
h+=`</div>`;

// Historical model accuracy
if(p.playerModelHR||p.bucketHR){
  h+=`<div class="ctx">`;
  if(p.playerModelHR) h+=`<span>Model on this player: ${p.playerModelHR}% (${p.playerModelPlays}p)</span>`;
  if(p.bucketHR) h+=`<span>Similar plays: ${p.bucketHR}% (${p.bucketPlays}p)</span>`;
  h+=`</div>`;
}

// Post-match reason
if(p.reason&&p.result) h+=`<div class="rsn" style="border-left:2px solid ${p.result==="WIN"?"var(--gr)":"var(--rd)"}"><strong style="color:${p.result==="WIN"?"var(--gr)":"var(--rd)"};font-size:10px">\u{1F3AF} RESULT ANALYSIS</strong><br>${p.reason}</div>`;

h+=`</div>`;
}

h+=`<div style="text-align:center;font:400 8px var(--S);color:var(--tx4);margin-top:4px;letter-spacing:1px">${o?"\u25B2":"\u25BC"}</div></div>`;
return h;
}

function tgl(k){if(exp.has(k))exp.delete(k);else exp.add(k);R();}
R();

_load();
</script>
</body>
</html>
