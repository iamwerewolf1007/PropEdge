else fl.forEach(p=>{h+=card(p);});

}else if(tab==="season"){
h+=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px">${[[SN.w+"W/"+SN.l+"L","Season","var(--tx)"],[shr+"%","Hit Rate",shr>=55?"var(--gr)":"var(--rd)"],[st1+"%","Tier 1","var(--gr)"],[st2+"%","Tier 2","var(--bl)"]].map(([v,l,c])=>`<div style="background:var(--bg1);border-radius:10px;padding:10px 4px;text-align:center"><div style="font:700 17px var(--M);color:${c}">${v}</div><div style="font:500 7px var(--M);color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;margin-top:2px">${l}</div></div>`).join("")}</div>`;

h+=`<div style="font:600 9px var(--M);color:var(--tx3);letter-spacing:1.2px;margin:18px 0 8px">DAILY HEATMAP</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px">${["S","M","T","W","T","F","S"].map(d=>`<div style="text-align:center;font:600 8px var(--M);color:var(--tx3);padding:2px">${d}</div>`).join("")}`;
let pad=true;DS.forEach((d,i)=>{const dt=new Date(d.date+"T12:00:00");if(pad&&i===0){for(let j=0;j<dt.getDay();j++)h+=`<div></div>`;pad=false;}
const hr=d.graded?Math.round(d.wins/d.graded*100):0;
const bg=d.graded===0?"var(--bg1)":hr>=65?"rgba(52,211,153,.45)":hr>=55?"rgba(52,211,153,.2)":hr>=45?"rgba(251,191,36,.2)":"rgba(248,113,113,.3)";
h+=`<div onclick="jD('${d.date}')" style="aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font:600 8px var(--M);cursor:pointer;background:${bg}" title="${d.date}: ${d.wins}W/${d.losses}L">${dt.getDate()}</div>`;});
h+=`</div>`;

h+=`<div style="font:600 9px var(--M);color:var(--tx3);letter-spacing:1.2px;margin:14px 0 6px">MONTHLY BREAKDOWN</div>`;
const mo={};DS.forEach(d=>{const m=d.date.substring(0,7);if(!mo[m])mo[m]={g:0,w:0,l:0,t1:0,t1w:0};const mm=mo[m];mm.g+=d.graded;mm.w+=d.wins;mm.l+=d.losses;mm.t1+=d.t1;mm.t1w+=d.t1w;});
Object.entries(mo).forEach(([m,v])=>{const mhr=v.g?Math.round(v.w/v.g*1000)/10:0;const t1h=v.t1?Math.round(v.t1w/v.t1*1000)/10:0;
h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--bg1);border-radius:8px;margin-bottom:4px"><span style="font:600 11px var(--M);color:var(--tx)">${m}</span><span style="font:500 10px var(--M);color:var(--tx2)">${v.w}W/${v.l}L</span><span style="font:700 12px var(--M);color:${mhr>=55?"var(--gr)":"var(--rd)"}">${mhr}%</span><span style="font:500 9px var(--M);color:var(--tx3)">T1:${t1h}%</span></div>`;});

}else{
// Leaders
const pm={};P.forEach(p=>{if(p.tier>2||!p.result||p.result==="PUSH")return;if(!pm[p.player])pm[p.player]={n:0,w:0};pm[p.player].n++;if(p.result==="WIN")pm[p.player].w++;});
let ld=Object.entries(pm).map(([n,s])=>({n,p:s.n,w:s.w,h:Math.round(s.w/s.n*1000)/10})).filter(x=>x.p>=3).sort((a,b)=>b.h-a.h);
h+=`<div style="font:600 9px var(--M);color:var(--tx3);letter-spacing:1.2px;margin-bottom:10px">TOP PLAYERS (T1+T2, 3+ PLAYS)</div>`;
ld.slice(0,40).forEach((p,i)=>{const c=p.h>=65?"var(--gr)":p.h>=55?"var(--bl)":"var(--rd)";const medal=i===0?"\u{1F947}":i===1?"\u{1F948}":i===2?"\u{1F949}":"";
h+=`<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg1);border-radius:8px;margin-bottom:3px"><span style="font:700 10px var(--M);color:var(--tx3);min-width:22px">${medal||i+1}</span><span style="font:600 11px var(--S);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.n}</span><span style="font:500 9px var(--M);color:var(--tx2)">${p.p}p</span><div style="width:55px;height:7px;background:var(--bg2);border-radius:4px;overflow:hidden"><div style="width:${Math.min(100,p.h)}%;height:100%;background:${c};border-radius:4px"></div></div><span style="font:700 11px var(--M);color:${c};min-width:38px;text-align:right">${p.h}%</span></div>`;});
}

h+=`<div style="margin-top:18px;background:var(--bg1);border-radius:10px;padding:14px;font:400 10px var(--S);color:var(--tx3);line-height:1.6"><strong style="color:var(--tx2)">Model:</strong> 10-signal engine &middot; T1 \u2265 62% (2u) &middot; T2 \u2265 55% (1u) &middot; Decimal odds &middot; Auto-refresh 60s</div>`;

document.getElementById("app").innerHTML=h;
setTimeout(()=>{const el=document.getElementById("adc");if(el)el.scrollIntoView({behavior:"auto",inline:"center",block:"nearest"});},60);
}

function card(p){
const ov=p.dir==="OVER",un=p.dir==="UNDER";
const bdr=ov?"var(--gr)":un?"var(--rd)":"var(--tx4)";
const bg=p.result==="WIN"?"rgba(6,78,59,.2)":p.result==="LOSS"?"rgba(69,10,10,.2)":"rgba(12,18,32,.7)";
const dBg=ov?"var(--grA)":un?"var(--rdA)":"rgba(148,163,184,.12)";
const dC=ov?"var(--gr)":un?"var(--rd)":"var(--tx2)";
const tBg=p.tier===1?"var(--grA)":p.tier===2?"var(--ylA)":"rgba(148,163,184,.06)";
const tC=p.tier===1?"var(--gr)":p.tier===2?"var(--yl)":"var(--tx4)";
const flagC=(p.flags||0)>=8?"var(--gr)":(p.flags||0)>=6?"var(--yl)":"var(--rd)";
const k=(p.player+"_"+p.date+"_"+p.line).replace(/'/g,"\\'");
const o=exp.has(p.player+"_"+p.date+"_"+p.line);
const odds=p.dir==="OVER"?p.overOdds:p.underOdds;

let h=`<div onclick="tgl('${k}')" style="border-radius:12px;padding:11px 13px;margin-bottom:7px;cursor:pointer;border-left:3px solid ${bdr};background:${bg};transition:all .2s">`;
h+=`<div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap"><span style="font:700 9px var(--M);padding:1px 7px;border-radius:8px;background:${dBg};color:${dC}">${p.dir==="NO PLAY"?p.rawDir:p.dir}</span><span style="font-weight:600;font-size:13px">${p.player}</span><span style="font:700 8px var(--M);padding:2px 5px;border-radius:4px;background:${tBg};color:${tC}">T${p.tier}</span>${p.flagsStr?`<span style="font:700 9px var(--M);padding:2px 6px;border-radius:4px;background:rgba(56,189,248,.08);color:${flagC}">${p.flagsStr}</span>`:""}</div><div style="font-size:9px;color:var(--tx2);margin-top:2px">${p.match} &middot; ${p.gameTime||""} &middot; ${Math.round(p.conf*100)}%</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">`;
if(p.result==="WIN")h+=`<span style="font:800 10px var(--M);padding:2px 8px;border-radius:5px;background:var(--grA);color:var(--gr)">WIN</span>`;
else if(p.result==="LOSS")h+=`<span style="font:800 10px var(--M);padding:2px 8px;border-radius:5px;background:var(--rdA);color:var(--rd)">LOSS</span>`;
else h+=`<span style="font:600 10px var(--M);color:var(--tx3)">${p.units}u</span>`;
if(p.actualPts!=null)h+=`<span style="font:400 10px var(--M);color:var(--tx2)">Actual: ${Math.round(p.actualPts)}</span>`;
if(p.edge!=null){const ec=p.edge>0?"var(--gr)":p.edge<-3?"var(--rd)":"var(--tx3)";h+=`<span style="font:600 9px var(--M);color:${ec}">Edge: ${p.edge>0?"+":""}${p.edge}%</span>`;}
h+=`</div></div>`;

h+=`<div style="display:flex;align-items:center;gap:10px;margin-top:8px">${[["Line",p.line,"var(--tx)"],["L30",p.l30,clr(p.l30,p.line)],["HR%",p.hr30+"%",hrc(p.hr30)],["Odds",odds||"-","var(--tx)"]].map(([k,v,c])=>`<div style="text-align:center"><div style="font:500 7px var(--M);color:var(--tx3);text-transform:uppercase;letter-spacing:.5px">${k}</div><div style="font:700 ${k==="Odds"?"12":"15"}px var(--M);color:${c};margin-top:1px">${v||"-"}</div></div>`).join("")}<div style="margin-left:auto">${spark(p.recent,p.line)}</div></div>`;

const cf=Math.max(0,Math.min(100,((p.conf-.45)/.4)*100));
h+=`<div style="display:flex;align-items:center;gap:6px;margin-top:6px"><span style="font:500 7px var(--M);color:var(--tx3);text-transform:uppercase;letter-spacing:.5px">Conf</span><div style="flex:1;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden"><div style="width:${cf}%;height:100%;background:${cfc(p.conf)};border-radius:2px"></div></div><span style="font:700 10px var(--M);color:${cfc(p.conf)};min-width:30px;text-align:right">${Math.round(p.conf*100)}%</span></div>`;

if(p.recent&&p.recent.length)h+=`<div style="display:flex;gap:5px;margin-top:5px">${p.recent.map(v=>`<span style="font:600 9px var(--M);color:${v>p.line?"var(--gr)":"var(--rd)"}">${v}</span>`).join("")}${p.recentOver!=null?`<span style="font:400 8px var(--M);color:var(--tx3);margin-left:4px">(${p.recentOver}/${p.recent.length} over)</span>`:""}</div>`;

if(o){
h+=`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--bg2);animation:fadeIn .25s ease-out">`;
if(p.preMatchReason)h+=`<div style="background:var(--bg1);border-radius:8px;padding:10px 12px;font:400 11px var(--S);color:var(--tx2);line-height:1.65;border-left:2px solid var(--bl);margin-bottom:8px"><strong style="color:var(--bl);font-size:10px">\u{1F4CA} MODEL ANALYSIS</strong><br>${p.preMatchReason}</div>`;
if(p.flagDetails){h+=`<div style="font:600 8px var(--M);color:var(--tx3);letter-spacing:1.2px;margin-bottom:5px">SIGNAL FLAGS (${p.flagsStr})</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">`;p.flagDetails.forEach(f=>{if(f.agrees==null)return;h+=`<div style="font:500 9px var(--M);padding:3px 8px;border-radius:6px;border:1px solid ${f.agrees?"rgba(52,211,153,.3)":"rgba(248,113,113,.2)"};background:${f.agrees?"rgba(52,211,153,.08)":"rgba(248,113,113,.06)"};color:${f.agrees?"var(--gr)":"var(--rd)"}">${f.agrees?"\u2713":"\u2717"} ${f.name}</div>`;});h+=`</div>`;}
h+=`<div style="font:600 8px var(--M);color:var(--tx3);letter-spacing:1.2px;margin-bottom:5px">SCORING</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:8px">${[["L30",p.l30],["L10",p.l10],["L5",p.l5],["L3",p.l3]].map(([k,v])=>`<div style="text-align:center"><div style="font:500 7px var(--M);color:var(--tx3)">${k}</div><div style="font:700 13px var(--M);color:${clr(v,p.line)}">${v||"-"}</div></div>`).join("")}</div>`;
h+=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:8px">${[["DEF POS","#"+(p.defP||"?"),dfc(p.defP||15)],["PACE","#"+(p.pace||"?"),"var(--tx)"],["FG L30",p.fgL30?p.fgL30+"%":"-","var(--tx)"],["MIN L30",p.minL30||"-","var(--tx)"]].map(([k,v,c])=>`<div style="text-align:center"><div style="font:500 7px var(--M);color:var(--tx3)">${k}</div><div style="font:700 13px var(--M);color:${c}">${v}</div></div>`).join("")}</div>`;
h+=`<div style="background:var(--bg);border-radius:8px;padding:9px;margin-bottom:6px;display:flex;gap:10px;flex-wrap:wrap;font:400 11px var(--S);color:var(--tx2);border:1px solid rgba(56,189,248,.04)">`;
if(p.overOdds)h+=`<span>Over: ${p.overOdds}</span>`;if(p.underOdds)h+=`<span>Under: ${p.underOdds}</span>`;
if(p.spread!=null)h+=`<span>Spread: ${p.spread>0?"+":""}${p.spread}</span>`;if(p.total!=null)h+=`<span>Total: ${p.total}</span>`;
if(p.blowout)h+=`<span style="color:var(--yl)">\u26A0 Blowout</span>`;if(p.h2hG>0)h+=`<span style="color:var(--vi)">H2H: ${p.h2h}</span>`;
if(p.std10)h+=`<span>\u03C3: ${p.std10}</span>`;h+=`</div>`;
if(p.homeAvgPts||p.b2bAvgPts){h+=`<div style="background:var(--bg);border-radius:8px;padding:9px;margin-bottom:6px;display:flex;gap:10px;flex-wrap:wrap;font:400 11px var(--S);color:var(--tx2);border:1px solid rgba(56,189,248,.04)">`;
if(p.homeAvgPts)h+=`<span>Home: ${p.homeAvgPts}</span>`;if(p.awayAvgPts)h+=`<span>Away: ${p.awayAvgPts}</span>`;
if(p.b2bAvgPts)h+=`<span>B2B: ${p.b2bAvgPts}</span>`;if(p.restAvgPts)h+=`<span>Rest: ${p.restAvgPts}</span>`;h+=`</div>`;}
if(p.playerModelHR||p.bucketHR){h+=`<div style="background:var(--bg);border-radius:8px;padding:9px;margin-bottom:6px;display:flex;gap:10px;flex-wrap:wrap;font:400 11px var(--S);color:var(--tx2);border:1px solid rgba(56,189,248,.04)">`;
if(p.playerModelHR)h+=`<span>Model on player: ${p.playerModelHR}% (${p.playerModelPlays}p)</span>`;if(p.bucketHR)h+=`<span>Similar: ${p.bucketHR}% (${p.bucketPlays}p)</span>`;h+=`</div>`;}
if(p.reason&&p.result)h+=`<div style="background:var(--bg1);border-radius:8px;padding:10px 12px;font:400 11px var(--S);color:var(--tx2);line-height:1.65;border-left:2px solid ${p.result==="WIN"?"var(--gr)":"var(--rd)"}"><strong style="color:${p.result==="WIN"?"var(--gr)":"var(--rd)"};font-size:10px">\u{1F3AF} RESULT</strong><br>${p.reason}</div>`;
h+=`</div>`;}
h+=`<div style="text-align:center;font:400 8px var(--S);color:var(--tx4);margin-top:4px;letter-spacing:1px">${o?"\u25B2":"\u25BC"}</div></div>`;
return h;
}

function sTab(t){tab=t;mf="all";df="all";rf="all";tf="all";R();}
function pD(i){di=i;mf="all";df="all";rf="all";tf="all";exp.clear();R();}
function jD(d){tab="daily";const dates=[...new Set(P.map(p=>p.date))].sort();const i=dates.indexOf(d);if(i>=0)di=i;mf="all";df="all";rf="all";tf="all";exp.clear();R();}
function tgl(k){if(exp.has(k))exp.delete(k);else exp.add(k);R();}

init();
</script>
</body>
</html>
