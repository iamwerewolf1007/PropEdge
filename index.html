else if(tab==="season"){h+=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px">${[[SN.w+"W/"+SN.l+"L","Season","var(--tx)"],[shr+"%","HR",shr>=55?"var(--gr)":"var(--rd)"],[st1+"%","T1","var(--gr)"],[st2+"%","T2","var(--bl)"]].map(([v,l,c])=>`<div style="background:var(--bg1);border-radius:10px;padding:10px 4px;text-align:center"><div style="font:700 17px var(--M);color:${c}">${v}</div><div style="font:500 7px var(--M);color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;margin-top:2px">${l}</div></div>`).join("")}</div>`;h+=`<div style="font:600 9px var(--M);color:var(--tx3);letter-spacing:1.2px;margin:4px 0 8px">HEATMAP</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px">${["S","M","T","W","T","F","S"].map(d=>`<div style="text-align:center;font:600 8px var(--M);color:var(--tx3);padding:2px">${d}</div>`).join("")}`;let pad=true;DS.forEach((d,i)=>{const dt=new Date(d.date+"T12:00:00");if(pad&&i===0){for(let j=0;j<dt.getDay();j++)h+=`<div></div>`;pad=false;}const hr=d.graded?Math.round(d.wins/d.graded*100):0;const bg=d.graded===0?"var(--bg1)":hr>=65?"rgba(52,211,153,.45)":hr>=55?"rgba(52,211,153,.2)":hr>=45?"rgba(251,191,36,.2)":"rgba(248,113,113,.3)";h+=`<div onclick="jD('${d.date}')" style="aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font:600 8px var(--M);cursor:pointer;background:${bg}">${dt.getDate()}</div>`;});h+=`</div>`;h+=`<div style="font:600 9px var(--M);color:var(--tx3);letter-spacing:1.2px;margin:14px 0 6px">MONTHLY</div>`;const mo={};DS.forEach(d=>{const m=d.date.substring(0,7);if(!mo[m])mo[m]={g:0,w:0,l:0,t1:0,t1w:0};const mm=mo[m];mm.g+=d.graded;mm.w+=d.wins;mm.l+=d.losses;mm.t1+=d.t1;mm.t1w+=d.t1w;});Object.entries(mo).forEach(([m,v])=>{const mhr=v.g?Math.round(v.w/v.g*1000)/10:0;h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--bg1);border-radius:8px;margin-bo function card(p){const ov=p.dir==="OVER",un=p.dir==="UNDER";const bdr=ov?"var(--gr)":un?"var(--rd)":"var(--tx4)";const bg=p.result==="WIN"?"rgba(6,78,59,.2)":p.result==="LOSS"?"rgba(69,10,10,.2)":"rgba(12,18,32,.7)";const dBg=ov?"var(--grA)":un?"var(--rdA)":"rgba(148,163,184,.12)";const dC=ov?"var(--gr)":un?"var(--rd)":"var(--tx2)";const tC=p.tier===1?"var(--gr)":p.tier===2?"var(--yl)":"var(--tx4)";const tBg=p.tier===1?"var(--grA)":p.tier===2?"var(--ylA)":"rgba(148,163,184,.06)";const flagC=(p.flags||0)>=8?"var(--gr)":(p.flags||0)>=6?"var(--yl)":"var(--rd)";const k=(p.player+"_"+p.date+"_"+p.line).replace(/'/g,"\\'");const o=exp.has(p.player+"_"+p.date+"_"+p.line);const odds=p.dir==="OVER"?p.overOdds:p.underOdds;let h=`<div onclick="tgl('${k}')" style="border-radius:12px;padding:11px 13px;margin-bottom:7px;cursor:pointer;border-left:3px solid ${bdr};background:${bg}"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap"><span style="font:700 9px var(--M);padding:1px 7px;border-radius:8px;background:${dBg};color:${dC}">${p.dir==="NO PLAY"?(p.rawDir||""):p.dir}</span><span style="font-weight:600;font-size:13px">${p.player||""}</span><span style="font:700 8px var(--M);padding:2px 5px;border-radius:4px;background:${tBg};color:${tC}">T${p.tier||"?"}</span>${p.flagsStr?`<span style="font:700 9px var(--M);padding:2px 6px;border-radius:4px;background:rgba(56,189,248,.08);color:${flagC}">${p.flagsStr}</span>`:""}</div><div style="font-size:9px;color:var(--tx2);margin-top:2px">${p.match||""} &middot; ${Math.round((p.conf||.5)*100)}%</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">`;if(p.result==="WIN")h+=`<span style="font:800 10px var(--M);padding:2px 8px;border-radius:5px;background:var(--grA);color:var(--gr)">WIN</span>`;else if(p.result==="LOSS")h+=`<span style="font:800 10px var(--M);padding:2px 8px;border-radius:5px;bac
